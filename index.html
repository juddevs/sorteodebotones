<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige tu destino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ocean-background">
        <div class="ship ship-1"><div class="ship-inner">🏴‍☠️</div></div>
        <div class="ship ship-2"><div class="ship-inner">🏴‍☠️</div></div>
        <div class="ship ship-3"><div class="ship-inner">🏴‍☠️</div></div>
    </div>
    <main class="container">
        <h1 class="title">Elige tu destino</h1>
        
        <div id="game-options" class="button-group fade-in">
            <button id="btn-red" class="btn btn-red" aria-label="Elegir rojo"></button>
            <button id="btn-blue" class="btn btn-blue" aria-label="Elegir azul"></button>
        </div>

        <div id="result-container" class="result-container hidden">
            <h2 id="result-message" class="result-message"></h2>
            <button id="btn-play-again" class="btn-play-again">Volver a jugar</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
